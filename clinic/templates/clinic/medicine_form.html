{% extends 'clinic/base.html' %}
{% block content %}

<style>
  .med-form-wrap {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  .med-form-title {
    font-weight: 700;
    color: #c2185b;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.2rem;
  }

  .field-wrap {
    margin-bottom: 1.1rem;
  }

  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    display: block;
    margin-bottom: 5px;
  }

  /* All inputs and textareas */
  .med-form-wrap input[type="text"],
  .med-form-wrap input[type="number"],
  .med-form-wrap input[type="date"],
  .med-form-wrap textarea {
    width: 100%;
    padding: 9px 14px;
    border: 1.5px solid #f9a8d4;
    border-radius: 10px;
    font-size: 13px;
    color: #111;
    box-sizing: border-box;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }

  .med-form-wrap input:focus,
  .med-form-wrap textarea:focus {
    border-color: #ec4899;
    box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
  }

  /* Custom styled select — matches all other inputs */
  .select-wrap {
    position: relative;
  }

  .select-wrap select {
    width: 100%;
    padding: 9px 36px 9px 14px;
    border: 1.5px solid #f9a8d4;
    border-radius: 10px;
    font-size: 13px;
    color: #111;
    background: white;
    appearance: none;
    -webkit-appearance: none;
    box-sizing: border-box;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .select-wrap select:focus {
    border-color: #ec4899;
    box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
  }

  /* Custom arrow icon */
  .select-wrap .arrow-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #ec4899;
  }

  .field-error {
    color: #c62828;
    font-size: 12px;
    margin-top: 3px;
  }

  /* Buttons */
  .form-btns {
    display: flex;
    gap: 10px;
    margin-top: 1.8rem;
  }

  .btn-submit {
    background: linear-gradient(135deg, #e83e8c, #c2185b);
    color: white;
    padding: 10px 28px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(232,62,140,0.3);
  }
  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,62,140,0.45);
    background: linear-gradient(135deg, #d63384, #ad1457);
  }
  .btn-submit:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(232,62,140,0.3);
  }

  .btn-cancel {
    background: #fce7f3;
    color: #be185d;
    padding: 10px 28px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    border: 1.5px solid #f9a8d4;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .btn-cancel:hover {
    background: #fce4ec;
    border-color: #ec4899;
    color: #c2185b;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(236,72,153,0.15);
  }
  .btn-cancel:active {
    transform: translateY(0);
  }
</style>

<div class="med-form-wrap">
  <div class="med-form-title">
    <i class="bi bi-capsule-pill"></i> {{ title }}
  </div>

  <form method="post">
    {% csrf_token %}

    {% for field in form %}
    <div class="field-wrap">
      <label class="field-label">{{ field.label }}</label>

      {% if field.field.widget.input_type == 'select' %}
        <div class="select-wrap">
          {{ field }}
          <span class="arrow-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </span>
        </div>
      {% else %}
        {{ field }}
      {% endif %}

      {% if field.errors %}
        <div class="field-error">{{ field.errors }}</div>
      {% endif %}
    </div>
    {% endfor %}

    <div class="form-btns">
      <button type="submit" class="btn-submit">
        <i></i> {{ action }} Medicine
      </button>
      <a href="{% url 'medicine_list' %}" class="btn-cancel">
        <iy></i> Cancel
      </a>
    </div>
  </form>
</div>

{% endblock %}
